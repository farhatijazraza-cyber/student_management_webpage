{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white shadow-sm">
                <div class="card-body">
                    <h5><i class="fas fa-user-graduate"></i> Total Students</h5>
                    <h2 class="fw-bold">{{ students|length }}</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Student Directory</h5>
            <input type="text" id="searchInput" class="form-control w-25" placeholder="Search by name...">
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="studentTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Contact</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>#{{ student['id'] }}</td>
                        <td class="fw-bold">{{ student['name'] }}</td>
                        <td><span class="badge bg-secondary">{{ student['class_name'] }}</span></td>
                        <td>{{ student['contact'] }}</td>
                        <td class="text-center">
                            <a href="{{ url_for('admission.edit_student', id=student['id']) }}" class="btn btn-sm btn-warning me-1">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="{{ url_for('admission.delete_student', id=student['id']) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete record?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                        <td class="text-center">
    <a href="{{ url_for('admission.student_profile', id=student['id']) }}" class="btn btn-sm btn-info me-1 text-white">
        <i class="fas fa-user"></i>
    </a>
    
    <a href="{{ url_for('admission.edit_student', id=student['id']) }}" class="btn btn-sm btn-warning me-1">
        <i class="fas fa-edit"></i>
    </a>
    
    <a href="{{ url_for('admission.delete_student', id=student['id']) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete record?')">
        <i class="fas fa-trash"></i>
    </a>
</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.getElementById('searchInput').addEventListener('keyup', function() {
    let filter = this.value.toUpperCase();
    let rows = document.querySelector("#studentTable tbody").rows;
    for (let i = 0; i < rows.length; i++) {
        let nameCol = rows[i].cells[1].textContent.toUpperCase();
        rows[i].style.display = nameCol.indexOf(filter) > -1 ? "" : "none";
    }
});
</script>
{% endblock %}
